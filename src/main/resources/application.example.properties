spring.application.name=nutrihealth
project.image=images
server.port=8080

# Database ? fill in your local PostgreSQL details
spring.datasource.url=jdbc:postgresql://localhost:5432/nutrihealth
spring.datasource.username=YOUR_DB_USERNAME
spring.datasource.password=YOUR_DB_PASSWORD

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.security.user.password=YOUR_PASSWORD
spring.security.user.name=YOUR_USERNAME

spring.app.jwtSecret=YOUR_JWT_SECRET_KEY
spring.app.jwtExpirationMs=3000000
spring.ecom.app.jwtCookieName=springBootEcom