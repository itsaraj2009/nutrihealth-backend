spring.application.name=nutrihealth
project.image=images
server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/nutrihealth}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.security.user.password=${SPRING_SECURITY_PASSWORD:Test@123}
spring.security.user.name=${SPRING_SECURITY_USERNAME:test}

spring.app.jwtSecret=${SPRING_APP_JWTSECRET:bXlTZWNyZXRLZXkxMjM5MTI3Mzhhb3BzZ2puc3BrbW5kZnNvcGt2YWpvaXJqZzk0Z2Yyb3BmbmcybW9rbm0=}
spring.app.jwtExpirationMs=3000000
spring.ecom.app.jwtCookieName=springBootEcom